<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image to PDF Converter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f4f0;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container { max-width: 700px; margin: 0 auto; }

    header { margin-bottom: 2rem; }
    header h1 { font-size: 22px; font-weight: 600; }
    header p { font-size: 14px; color: #666; margin-top: 4px; }

    .card {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e2e2de;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    /* Drop Zone */
    .drop-zone {
      border: 2px dashed #c8c8c2;
      border-radius: 10px;
      padding: 3rem 1rem;
      text-align: center;
      cursor: pointer;
      background: #fafaf8;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: #888;
      background: #f0f0ec;
    }
    .drop-icon { font-size: 36px; display: block; margin-bottom: 10px; }
    .drop-label { font-size: 15px; color: #444; font-weight: 500; }
    .drop-sub { font-size: 13px; color: #888; margin-top: 5px; }

    /* Options */
    .options {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin: 1rem 0;
      font-size: 13px;
      color: #555;
    }
    .options label { display: flex; align-items: center; gap: 6px; }
    .options select {
      padding: 5px 8px;
      font-size: 13px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
      color: #1a1a1a;
      cursor: pointer;
    }

    /* Action buttons */
    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }

    button {
      padding: 8px 18px;
      font-size: 14px;
      font-weight: 500;
      border: 1px solid #d0d0cc;
      border-radius: 8px;
      background: #fff;
      color: #1a1a1a;
      cursor: pointer;
      transition: background 0.1s;
    }
    button:hover:not(:disabled) { background: #f0f0ec; }
    button:active:not(:disabled) { transform: scale(0.98); }
    button:disabled { opacity: 0.4; cursor: default; }

    button.primary {
      background: #1a1a1a;
      color: #fff;
      border-color: transparent;
    }
    button.primary:hover:not(:disabled) { background: #333; }

    /* Progress */
    .progress-wrap {
      height: 4px;
      background: #e8e8e4;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 10px;
      display: none;
    }
    .progress-bar {
      height: 100%;
      background: #1a1a1a;
      width: 0;
      transition: width 0.2s ease;
    }

    /* Status */
    .status {
      font-size: 13px;
      color: #666;
      min-height: 20px;
      margin-bottom: 12px;
    }
    .status.ok { color: #2a7a2a; }
    .status.err { color: #c0392b; }

    /* Image grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 10px;
    }
    .thumb-card {
      background: #f4f4f0;
      border: 1px solid #e2e2de;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }
    .thumb-card img {
      width: 100%;
      height: 100px;
      object-fit: cover;
      display: block;
    }
    .thumb-footer {
      padding: 4px 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .thumb-name {
      font-size: 11px;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 75px;
    }
    .thumb-btns { display: flex; gap: 2px; }
    .thumb-btns button {
      padding: 2px 5px;
      font-size: 11px;
      border: none;
      background: none;
      color: #888;
      cursor: pointer;
    }
    .thumb-btns button:hover { background: #e8e8e4; border-radius: 4px; color: #1a1a1a; }
    .del-btn {
      position: absolute;
      top: 4px; right: 4px;
      background: rgba(0,0,0,0.55) !important;
      color: #fff !important;
      border: none !important;
      border-radius: 50% !important;
      width: 20px; height: 20px;
      font-size: 13px;
      display: flex; align-items: center; justify-content: center;
      padding: 0 !important;
      line-height: 1;
    }

    .empty-msg {
      text-align: center;
      font-size: 14px;
      color: #aaa;
      padding: 1.5rem;
    }

    footer {
      text-align: center;
      font-size: 12px;
      color: #aaa;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>

<div class="container">

  <header>
    <h1>🖼️ Image to PDF Converter</h1>
    <p>100% local — files never leave your device.</p>
  </header>

  <div class="card">

    <!-- Drop zone -->
    <div class="drop-zone" id="dropZone">
      <span class="drop-icon">📂</span>
      <div class="drop-label">Click to select images, or drag & drop here</div>
      <div class="drop-sub">JPG · PNG · WebP · GIF · BMP — any aspect ratio supported</div>
    </div>
    <input type="file" id="fileInput" accept="image/*" multiple hidden>

    <!-- Options -->
    <div class="options">
      <label>Page size:
        <select id="pageSize">
          <option value="fit">Fit to image (recommended)</option>
          <option value="a4">A4 (210 × 297 mm)</option>
          <option value="letter">Letter (8.5 × 11 in)</option>
        </select>
      </label>
      <label>Orientation:
        <select id="orient">
          <option value="auto">Auto per image</option>
          <option value="portrait">Always portrait</option>
          <option value="landscape">Always landscape</option>
        </select>
      </label>
      <label>Quality:
        <select id="quality">
          <option value="0.95">High</option>
          <option value="0.80" selected>Medium</option>
          <option value="0.60">Low (smaller file)</option>
        </select>
      </label>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button id="addBtn">+ Add more images</button>
      <button id="clearBtn" disabled>Clear all</button>
      <button class="primary" id="convertBtn" disabled>Convert to PDF</button>
      <button class="primary" id="downloadBtn" style="display:none;">⬇ Download PDF</button>
    </div>

    <!-- Progress + Status -->
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="status" id="status">No images selected.</div>

    <!-- Thumbnail grid -->
    <div class="grid" id="grid">
      <div class="empty-msg">No images added yet.</div>
    </div>

  </div>

  <footer>100% client-side · No uploads · No server</footer>

</div>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
  const { jsPDF } = window.jspdf;

  let files = [];
  let pdfBlob = null;

  const dropZone    = document.getElementById('dropZone');
  const fileInput   = document.getElementById('fileInput');
  const grid        = document.getElementById('grid');
  const statusEl    = document.getElementById('status');
  const addBtn      = document.getElementById('addBtn');
  const clearBtn    = document.getElementById('clearBtn');
  const convertBtn  = document.getElementById('convertBtn');
  const downloadBtn = document.getElementById('downloadBtn');
  const progressWrap= document.getElementById('progressWrap');
  const progressBar = document.getElementById('progressBar');

  /* ---- File picking ---- */
  dropZone.addEventListener('click', () => fileInput.click());
  addBtn.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', () => {
    addFiles(Array.from(fileInput.files));
    fileInput.value = '';
  });

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const imgs = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
    addFiles(imgs);
  });

  function addFiles(newFiles) {
    files.push(...newFiles);
    pdfBlob = null;
    renderGrid();
    updateUI();
  }

  clearBtn.addEventListener('click', () => {
    files = []; pdfBlob = null;
    renderGrid(); updateUI();
  });

  /* ---- Render thumbnails ---- */
  function renderGrid() {
    grid.innerHTML = '';
    if (!files.length) {
      grid.innerHTML = '<div class="empty-msg">No images added yet.</div>';
      return;
    }
    files.forEach((file, i) => {
      const card = document.createElement('div');
      card.className = 'thumb-card';

      const img = document.createElement('img');
      img.src = URL.createObjectURL(file);
      img.alt = file.name;

      const delBtn = document.createElement('button');
      delBtn.className = 'del-btn';
      delBtn.textContent = '×';
      delBtn.title = 'Remove';
      delBtn.addEventListener('click', () => {
        files.splice(i, 1); pdfBlob = null;
        renderGrid(); updateUI();
      });

      const footer = document.createElement('div');
      footer.className = 'thumb-footer';

      const name = document.createElement('span');
      name.className = 'thumb-name';
      name.textContent = file.name;
      name.title = file.name;

      const btns = document.createElement('div');
      btns.className = 'thumb-btns';

      if (i > 0) {
        const up = document.createElement('button');
        up.textContent = '↑'; up.title = 'Move up';
        up.addEventListener('click', () => {
          [files[i-1], files[i]] = [files[i], files[i-1]];
          pdfBlob = null; renderGrid();
        });
        btns.appendChild(up);
      }
      if (i < files.length - 1) {
        const dn = document.createElement('button');
        dn.textContent = '↓'; dn.title = 'Move down';
        dn.addEventListener('click', () => {
          [files[i+1], files[i]] = [files[i], files[i+1]];
          pdfBlob = null; renderGrid();
        });
        btns.appendChild(dn);
      }

      footer.appendChild(name);
      footer.appendChild(btns);
      card.appendChild(img);
      card.appendChild(delBtn);
      card.appendChild(footer);
      grid.appendChild(card);
    });
  }

  function updateUI() {
    const has = files.length > 0;
    clearBtn.disabled = !has;
    convertBtn.disabled = !has;
    convertBtn.style.display = '';
    downloadBtn.style.display = 'none';
    setStatus(has ? `${files.length} image${files.length !== 1 ? 's' : ''} ready. Reorder with ↑↓ if needed.` : 'No images selected.', '');
  }

  function setStatus(msg, cls) {
    statusEl.textContent = msg;
    statusEl.className = 'status' + (cls ? ' ' + cls : '');
  }

  /* ---- Load an image into an <img> element ---- */
  function loadImageElement(file) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => resolve({ img, url, w: img.naturalWidth, h: img.naturalHeight });
      img.onerror = () => reject(new Error('Cannot load: ' + file.name));
      img.src = url;
    });
  }

  /* ---- Draw image to canvas → JPEG data URL (fixes orientation, format) ---- */
  function toJpegDataUrl(imgEl, quality) {
    const canvas = document.createElement('canvas');
    canvas.width  = imgEl.naturalWidth;
    canvas.height = imgEl.naturalHeight;
    const ctx = canvas.getContext('2d');
    // White background so transparent PNGs look clean
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(imgEl, 0, 0);
    return canvas.toDataURL('image/jpeg', quality);
  }

  /* ---- Convert ---- */
  convertBtn.addEventListener('click', async () => {
    if (!files.length) return;

    convertBtn.disabled = true;
    downloadBtn.style.display = 'none';
    progressWrap.style.display = 'block';
    progressBar.style.width = '0%';

    const pageSizeVal = document.getElementById('pageSize').value;
    const orientVal   = document.getElementById('orient').value;
    const quality     = parseFloat(document.getElementById('quality').value);

    // Fixed page dimensions in mm
    const FIXED_SIZES = {
      a4:     [210, 297],
      letter: [215.9, 279.4]
    };

    try {
      let pdf = null;

      for (let i = 0; i < files.length; i++) {
        setStatus(`Processing image ${i + 1} of ${files.length}…`);
        progressBar.style.width = (i / files.length * 100) + '%';

        const { img, url, w, h } = await loadImageElement(files[i]);
        const imgRatio = w / h;
        const isWide   = w >= h;

        let pageW, pageH, pageOrient;

        if (pageSizeVal === 'fit') {
          // Page matches image pixel dimensions converted to mm
          const MM_PER_PX = 0.264583;
          pageW = w * MM_PER_PX;
          pageH = h * MM_PER_PX;
          pageOrient = isWide ? 'landscape' : 'portrait';
        } else {
          const [fw, fh] = FIXED_SIZES[pageSizeVal];
          if (orientVal === 'auto') {
            pageOrient = isWide ? 'landscape' : 'portrait';
          } else {
            pageOrient = orientVal;
          }
          pageW = pageOrient === 'landscape' ? Math.max(fw, fh) : Math.min(fw, fh);
          pageH = pageOrient === 'landscape' ? Math.min(fw, fh) : Math.max(fw, fh);
        }

        if (!pdf) {
          pdf = new jsPDF({
            orientation: pageOrient,
            unit: 'mm',
            format: pageSizeVal === 'fit' ? [pageW, pageH] : pageSizeVal
          });
        } else {
          pdf.addPage(
            pageSizeVal === 'fit' ? [pageW, pageH] : pageSizeVal,
            pageOrient
          );
        }

        // Actual page size as reported by jsPDF (may differ from what we set)
        const pdfW = pdf.internal.pageSize.getWidth();
        const pdfH = pdf.internal.pageSize.getHeight();

        // Scale image to fit page, preserving aspect ratio, centred
        const pageRatio = pdfW / pdfH;
        let drawW, drawH, offsetX = 0, offsetY = 0;

        if (imgRatio >= pageRatio) {
          // Image is wider relative to page → fit width
          drawW = pdfW;
          drawH = pdfW / imgRatio;
          offsetY = (pdfH - drawH) / 2;
        } else {
          // Image is taller relative to page → fit height
          drawH = pdfH;
          drawW = pdfH * imgRatio;
          offsetX = (pdfW - drawW) / 2;
        }

        const dataUrl = toJpegDataUrl(img, quality);
        pdf.addImage(dataUrl, 'JPEG', offsetX, offsetY, drawW, drawH, '', 'FAST');

        URL.revokeObjectURL(url);
      }

      progressBar.style.width = '100%';
      pdfBlob = pdf.output('blob');
      setStatus(`✅ Done! ${files.length} page${files.length !== 1 ? 's' : ''} created.`, 'ok');
      convertBtn.style.display = 'none';
      downloadBtn.style.display = '';

    } catch (err) {
      setStatus('❌ Error: ' + err.message, 'err');
      convertBtn.disabled = false;
    }

    progressWrap.style.display = 'none';
  });

  /* ---- Download ---- */
  downloadBtn.addEventListener('click', () => {
    if (!pdfBlob) return;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(pdfBlob);
    a.download = 'converted.pdf';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  });

  /* Init */
  updateUI();
</script>
</body>
</html>
