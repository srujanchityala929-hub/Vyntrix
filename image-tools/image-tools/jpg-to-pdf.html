<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image to PDF Converter</title>
 <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

  <header>
    <h1>🖼️ Image to PDF Converter</h1>
    <p>100% local — files never leave your device.</p>
  </header>

  <div class="card">

    <!-- Drop zone -->
    <div class="drop-zone" id="dropZone">
      <span class="drop-icon">📂</span>
      <div class="drop-label">Click to select images, or drag & drop here</div>
      <div class="drop-sub">JPG · PNG · WebP · GIF · BMP — any aspect ratio supported</div>
    </div>
    <input type="file" id="fileInput" accept="image/*" multiple hidden>

    <!-- Options -->
    <div class="options">
      <label>Page size:
        <select id="pageSize">
          <option value="fit">Fit to image (recommended)</option>
          <option value="a4">A4 (210 × 297 mm)</option>
          <option value="letter">Letter (8.5 × 11 in)</option>
        </select>
      </label>
      <label>Orientation:
        <select id="orient">
          <option value="auto">Auto per image</option>
          <option value="portrait">Always portrait</option>
          <option value="landscape">Always landscape</option>
        </select>
      </label>
      <label>Quality:
        <select id="quality">
          <option value="0.95">High</option>
          <option value="0.80" selected>Medium</option>
          <option value="0.60">Low (smaller file)</option>
        </select>
      </label>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button id="addBtn">+ Add more images</button>
      <button id="clearBtn" disabled>Clear all</button>
      <button class="primary" id="convertBtn" disabled>Convert to PDF</button>
      <button class="primary" id="downloadBtn" style="display:none;">⬇ Download PDF</button>
    </div>

    <!-- Progress + Status -->
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="status" id="status">No images selected.</div>

    <!-- Thumbnail grid -->
    <div class="grid" id="grid">
      <div class="empty-msg">No images added yet.</div>
    </div>

  </div>

  <footer>100% client-side · No uploads · No server</footer>

</div>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
  const { jsPDF } = window.jspdf;

  let files = [];
  let pdfBlob = null;

  const dropZone    = document.getElementById('dropZone');
  const fileInput   = document.getElementById('fileInput');
  const grid        = document.getElementById('grid');
  const statusEl    = document.getElementById('status');
  const addBtn      = document.getElementById('addBtn');
  const clearBtn    = document.getElementById('clearBtn');
  const convertBtn  = document.getElementById('convertBtn');
  const downloadBtn = document.getElementById('downloadBtn');
  const progressWrap= document.getElementById('progressWrap');
  const progressBar = document.getElementById('progressBar');

  /* ---- File picking ---- */
  dropZone.addEventListener('click', () => fileInput.click());
  addBtn.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', () => {
    addFiles(Array.from(fileInput.files));
    fileInput.value = '';
  });

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const imgs = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
    addFiles(imgs);
  });

  function addFiles(newFiles) {
    files.push(...newFiles);
    pdfBlob = null;
    renderGrid();
    updateUI();
  }

  clearBtn.addEventListener('click', () => {
    files = []; pdfBlob = null;
    renderGrid(); updateUI();
  });

  /* ---- Render thumbnails ---- */
  function renderGrid() {
    grid.innerHTML = '';
    if (!files.length) {
      grid.innerHTML = '<div class="empty-msg">No images added yet.</div>';
      return;
    }
    files.forEach((file, i) => {
      const card = document.createElement('div');
      card.className = 'thumb-card';

      const img = document.createElement('img');
      img.src = URL.createObjectURL(file);
      img.alt = file.name;

      const delBtn = document.createElement('button');
      delBtn.className = 'del-btn';
      delBtn.textContent = '×';
      delBtn.title = 'Remove';
      delBtn.addEventListener('click', () => {
        files.splice(i, 1); pdfBlob = null;
        renderGrid(); updateUI();
      });

      const footer = document.createElement('div');
      footer.className = 'thumb-footer';

      const name = document.createElement('span');
      name.className = 'thumb-name';
      name.textContent = file.name;
      name.title = file.name;

      const btns = document.createElement('div');
      btns.className = 'thumb-btns';

      if (i > 0) {
        const up = document.createElement('button');
        up.textContent = '↑'; up.title = 'Move up';
        up.addEventListener('click', () => {
          [files[i-1], files[i]] = [files[i], files[i-1]];
          pdfBlob = null; renderGrid();
        });
        btns.appendChild(up);
      }
      if (i < files.length - 1) {
        const dn = document.createElement('button');
        dn.textContent = '↓'; dn.title = 'Move down';
        dn.addEventListener('click', () => {
          [files[i+1], files[i]] = [files[i], files[i+1]];
          pdfBlob = null; renderGrid();
        });
        btns.appendChild(dn);
      }

      footer.appendChild(name);
      footer.appendChild(btns);
      card.appendChild(img);
      card.appendChild(delBtn);
      card.appendChild(footer);
      grid.appendChild(card);
    });
  }

  function updateUI() {
    const has = files.length > 0;
    clearBtn.disabled = !has;
    convertBtn.disabled = !has;
    convertBtn.style.display = '';
    downloadBtn.style.display = 'none';
    setStatus(has ? `${files.length} image${files.length !== 1 ? 's' : ''} ready. Reorder with ↑↓ if needed.` : 'No images selected.', '');
  }

  function setStatus(msg, cls) {
    statusEl.textContent = msg;
    statusEl.className = 'status' + (cls ? ' ' + cls : '');
  }

  /* ---- Load an image into an <img> element ---- */
  function loadImageElement(file) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => resolve({ img, url, w: img.naturalWidth, h: img.naturalHeight });
      img.onerror = () => reject(new Error('Cannot load: ' + file.name));
      img.src = url;
    });
  }

  /* ---- Draw image to canvas → JPEG data URL (fixes orientation, format) ---- */
  function toJpegDataUrl(imgEl, quality) {
    const canvas = document.createElement('canvas');
    canvas.width  = imgEl.naturalWidth;
    canvas.height = imgEl.naturalHeight;
    const ctx = canvas.getContext('2d');
    // White background so transparent PNGs look clean
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(imgEl, 0, 0);
    return canvas.toDataURL('image/jpeg', quality);
  }

  /* ---- Convert ---- */
  convertBtn.addEventListener('click', async () => {
    if (!files.length) return;

    convertBtn.disabled = true;
    downloadBtn.style.display = 'none';
    progressWrap.style.display = 'block';
    progressBar.style.width = '0%';

    const pageSizeVal = document.getElementById('pageSize').value;
    const orientVal   = document.getElementById('orient').value;
    const quality     = parseFloat(document.getElementById('quality').value);

    // Fixed page dimensions in mm
    const FIXED_SIZES = {
      a4:     [210, 297],
      letter: [215.9, 279.4]
    };

    try {
      let pdf = null;

      for (let i = 0; i < files.length; i++) {
        setStatus(`Processing image ${i + 1} of ${files.length}…`);
        progressBar.style.width = (i / files.length * 100) + '%';

        const { img, url, w, h } = await loadImageElement(files[i]);
        const imgRatio = w / h;
        const isWide   = w >= h;

        let pageW, pageH, pageOrient;

        if (pageSizeVal === 'fit') {
          // Page matches image pixel dimensions converted to mm
          const MM_PER_PX = 0.264583;
          pageW = w * MM_PER_PX;
          pageH = h * MM_PER_PX;
          pageOrient = isWide ? 'landscape' : 'portrait';
        } else {
          const [fw, fh] = FIXED_SIZES[pageSizeVal];
          if (orientVal === 'auto') {
            pageOrient = isWide ? 'landscape' : 'portrait';
          } else {
            pageOrient = orientVal;
          }
          pageW = pageOrient === 'landscape' ? Math.max(fw, fh) : Math.min(fw, fh);
          pageH = pageOrient === 'landscape' ? Math.min(fw, fh) : Math.max(fw, fh);
        }

        if (!pdf) {
          pdf = new jsPDF({
            orientation: pageOrient,
            unit: 'mm',
            format: pageSizeVal === 'fit' ? [pageW, pageH] : pageSizeVal
          });
        } else {
          pdf.addPage(
            pageSizeVal === 'fit' ? [pageW, pageH] : pageSizeVal,
            pageOrient
          );
        }

        // Actual page size as reported by jsPDF (may differ from what we set)
        const pdfW = pdf.internal.pageSize.getWidth();
        const pdfH = pdf.internal.pageSize.getHeight();

        // Scale image to fit page, preserving aspect ratio, centred
        const pageRatio = pdfW / pdfH;
        let drawW, drawH, offsetX = 0, offsetY = 0;

        if (imgRatio >= pageRatio) {
          // Image is wider relative to page → fit width
          drawW = pdfW;
          drawH = pdfW / imgRatio;
          offsetY = (pdfH - drawH) / 2;
        } else {
          // Image is taller relative to page → fit height
          drawH = pdfH;
          drawW = pdfH * imgRatio;
          offsetX = (pdfW - drawW) / 2;
        }

        const dataUrl = toJpegDataUrl(img, quality);
        pdf.addImage(dataUrl, 'JPEG', offsetX, offsetY, drawW, drawH, '', 'FAST');

        URL.revokeObjectURL(url);
      }

      progressBar.style.width = '100%';
      pdfBlob = pdf.output('blob');
      setStatus(`✅ Done! ${files.length} page${files.length !== 1 ? 's' : ''} created.`, 'ok');
      convertBtn.style.display = 'none';
      downloadBtn.style.display = '';

    } catch (err) {
      setStatus('❌ Error: ' + err.message, 'err');
      convertBtn.disabled = false;
    }

    progressWrap.style.display = 'none';
  });

  /* ---- Download ---- */
  downloadBtn.addEventListener('click', () => {
    if (!pdfBlob) return;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(pdfBlob);
    a.download = 'converted.pdf';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  });

  /* Init */
  updateUI();
</script>
</body>
</html>
